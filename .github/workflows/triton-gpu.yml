# Triton + CUDA tests (attention scores, fused attention, HF fused smoke).
#
# GitHub-hosted runners have no GPU. Enable this job by:
#   1. Repo variable: Settings → Secrets and variables → Actions → Variables
#      Name: ENABLE_SELF_HOSTED_GPU_CI   Value: true
#   2. Self-hosted runner with NVIDIA driver + CUDA, labels:
#        self-hosted, Linux, X64, turboquant-gpu
#   3. On the runner machine: install Python 3.11+, Git, and ensure `nvidia-smi` works.
#
# Runs weekly (UTC) and on manual workflow_dispatch when the variable is set.

name: Triton GPU

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: triton-gpu-${{ github.repository }}
  cancel-in-progress: true

jobs:
  test-triton-cuda:
    name: Triton (CUDA)
    if: vars.ENABLE_SELF_HOSTED_GPU_CI == 'true'
    runs-on: [self-hosted, Linux, X64, turboquant-gpu]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Environment sanity
        run: |
          nvidia-smi
          python -V

      - name: Install PyTorch (CUDA) + project
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu124
          pip install numpy
          pip install -e ".[hf,triton]"

      - name: Verify CUDA and Triton
        run: |
          python - <<'PY'
          import torch
          import triton
          assert torch.cuda.is_available(), "CUDA required on self-hosted GPU runner"
          print("torch", torch.__version__, "cuda", torch.version.cuda)
          print("device", torch.cuda.get_device_name(0))
          print("triton", triton.__version__)
          PY

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v
